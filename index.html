<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rabina 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff4e50,#f9d423);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

/* CARD */
.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

/* PHOTO */
.photo{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
background:url('https://drive.google.com/file/d/17WSGDqC2-nsI-k7jNwoqTSoHuogCUUdq/view?usp=drivesdk.jpg') center/cover;
border:3px solid white;
}

/* TEXT */
h1{font-size:2.5em;}
.name{color:yellow;}

/* BUTTON */
button{
margin:10px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4e50;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
button:hover{
transform:scale(1.1);
background:gold;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
}
.popup-box{
background:white;
color:black;
padding:25px;
border-radius:15px;
animation:zoom .3s;
}
@keyframes zoom{
from{transform:scale(0.5);}
to{transform:scale(1);}
}

/* HEARTS */
.heart{
position:absolute;
color:red;
animation:float 5s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* FIREWORK */
.spark{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:boom 1s linear forwards;
}
@keyframes boom{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

/* MUSIC BUTTON */
.music{
position:fixed;
bottom:20px;
right:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="photo"></div>

<h1>🎉 Happy Birthday <span class="name">Rabina</span> 🎂</h1>
<p>Wishing you endless happiness & love 💖</p>

<button onclick="showLove()">💌 Love</button>
<button onclick="wish()">🎁 Wish</button>

</div>

<!-- LOVE POPUP -->
<div class="popup" id="lovePopup">
<div class="popup-box">
<h2>I Love You Rabina BABY ❤️</h2>
<p>You are my everything 💖</p>
<button onclick="closeLove()">Close</button>
</div>
</div>

<!-- WISH POPUP -->
<div class="popup" id="wishPopup">
<div class="popup-box">
<h2>🎁 Special Wish</h2>
<p id="wishText"></p>
<button onclick="closeWish()">Close</button>
</div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-birthday.mp3">
</audio>

<button class="music" onclick="toggleMusic()">🎵</button>

<script>

// LOVE
function showLove(){
document.getElementById("lovePopup").style.display="flex";
}
function closeLove(){
document.getElementById("lovePopup").style.display="none";
}

// WISH
const wishes=[
"শুভ জন্মদিন! 🎉 অনেক সুখে থাকো 💖",
"তুমি আমার জীবনের সবচেয়ে সুন্দর মানুষ ❤️",
"তোমার সব স্বপ্ন পূরণ হোক ✨",
"তুমি সবসময় হাসিখুশি থাকো 😊",
"অনেক ভালোবাসা তোমার জন্য 💝"
];

function wish(){
let r=wishes[Math.floor(Math.random()*wishes.length)];
document.getElementById("wishText").innerText=r;
document.getElementById("wishPopup").style.display="flex";
firework();
}
function closeWish(){
document.getElementById("wishPopup").style.display="none";
}

// HEARTS
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

// FIREWORK
function firework(){
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left="50%";
s.style.top="50%";
s.style.setProperty('--x',(Math.random()*200-100)+"px");
s.style.setProperty('--y',(Math.random()*200-100)+"px");
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
}
}

// MUSIC
const music=document.getElementById("music");
function toggleMusic(){
if(music.paused) music.play();
else music.pause();
}

</script>

</body>
</html>
